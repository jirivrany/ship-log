{% extends "base.html" %}
{% block title %}Quick Note — {{ leg.from_port }} → {{ leg.to_port }}{% endblock %}

{% block content %}
<a href="/legs/{{ leg.id }}" class="text-muted small text-decoration-none">← {{ leg.from_port }} → {{ leg.to_port }}</a>
<h1 class="h4 mt-1 mb-4">Quick Note</h1>

<div class="card p-4" style="max-width:480px">
  <form id="quick-note-form" action="/legs/{{ leg.id }}/quick-note" method="post">
    <div class="mb-3">
      <textarea class="form-control" name="text" rows="5" placeholder="What's happening?" required autofocus></textarea>
    </div>
    <input type="hidden" name="lat" id="lat-input">
    <input type="hidden" name="lon" id="lon-input">
    <div id="geo-status" class="form-text mb-2">Getting position…</div>
    <button type="submit" class="btn btn-primary w-100">Save Note</button>
  </form>
</div>

<script>
  const status = document.getElementById('geo-status');
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('lat-input').value = pos.coords.latitude;
        document.getElementById('lon-input').value = pos.coords.longitude;
        status.textContent = 'Position attached';
      },
      () => { status.textContent = 'No position available — note will be saved without one'; },
      { timeout: 5000 }
    );
  } else {
    status.textContent = 'Geolocation not supported — note will be saved without a position';
  }
</script>
{% endblock %}
