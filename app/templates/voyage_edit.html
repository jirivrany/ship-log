{% extends "base.html" %}
{% block title %}Edit — {{ v.name }}{% endblock %}

{% block content %}
<a href="/voyages/{{ v.id }}" class="text-muted small text-decoration-none">← {{ v.name }}</a>
<h1 class="h3 mt-1 mb-4">Edit Voyage</h1>

<div class="card card-body">
  <form action="/voyages/{{ v.id }}/edit" method="post">
    {% include "partials/voyage_form_fields.html" %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/voyages/{{ v.id }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
