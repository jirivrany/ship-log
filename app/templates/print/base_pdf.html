<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @page {
    size: A4;
    margin: 14mm 14mm 16mm 14mm;
    @bottom-left { content: "{{ voyage.name }} — ship log"; font-size: 7pt; color: #666; }
    @bottom-right { content: "page " counter(page) " / " counter(pages); font-size: 7pt; color: #666; }
  }
  @page day { size: A4 landscape; }
  .day-page { page: day; page-break-before: always; }
  .first-page { page-break-before: avoid; }

  body { font-family: "DejaVu Sans", sans-serif; font-size: 9pt; color: #111; }
  h1 { font-size: 20pt; margin: 0 0 2mm 0; }
  h2 { font-size: 13pt; margin: 0 0 3mm 0; }
  h3 { font-size: 9pt; text-transform: uppercase; letter-spacing: 0.5pt; color: #555; margin: 0 0 1.5mm 0; }
  .muted { color: #666; }
  .small { font-size: 7.5pt; }

  table { border-collapse: collapse; width: 100%; }
  th, td { border: 0.4pt solid #999; padding: 1mm 1.5mm; text-align: left; vertical-align: top; }
  th { background: #eee; font-weight: bold; }

  table.plain, table.plain th, table.plain td { border: none; padding: 0.8mm 2mm 0.8mm 0; }
  table.plain th { background: none; color: #555; font-weight: normal; width: 38mm; }

  .cover-header { border-bottom: 2pt solid #1e3a5f; padding-bottom: 3mm; margin-bottom: 6mm; }
  .section { margin-bottom: 6mm; }
  .columns { display: flex; gap: 8mm; }
  .columns > div { flex: 1; }

  .day-header { display: flex; justify-content: space-between; align-items: baseline;
                border-bottom: 1.5pt solid #1e3a5f; padding-bottom: 2mm; margin-bottom: 3mm; }
  .day-header .route { font-size: 14pt; font-weight: bold; }
  .forecast-row { display: flex; gap: 4mm; margin-bottom: 3mm; }
  .forecast-row > div { flex: 1; border: 0.4pt solid #bbb; padding: 1.5mm 2mm; min-height: 9mm; }
  .images-row { display: flex; gap: 4mm; margin-bottom: 3mm; align-items: flex-start; }
  .images-row figure { margin: 0; flex: 1; text-align: center; }
  .images-row img { max-width: 100%; max-height: 72mm; }
  .images-row figcaption { font-size: 6.5pt; color: #666; margin-top: 0.5mm; }

  table.entries { font-size: 7pt; }
  table.entries th, table.entries td { padding: 0.8mm 1mm; }
  .totals { margin-top: 2.5mm; display: flex; gap: 8mm; font-size: 8.5pt; }
  .totals b { font-size: 10.5pt; }
  .notes-block { margin-top: 3mm; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
