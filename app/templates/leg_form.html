{% extends "base.html" %}
{% block title %}Add Leg — {{ voyage.name }}{% endblock %}

{% block content %}
<a href="/voyages/{{ voyage.id }}" class="text-muted small text-decoration-none">← {{ voyage.name }}</a>
<h1 class="h3 mt-1 mb-4">Add Leg</h1>

<div class="card p-4" style="max-width:480px">
  <form action="/voyages/{{ voyage.id }}/legs/preview" method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">FIT File</label>
      <input type="file" class="form-control form-control-sm" name="fit_file" accept=".fit" required>
      <div class="form-text">Strava Sauce export — date and ports will be parsed automatically</div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Upload &amp; Preview</button>
      <a href="/voyages/{{ voyage.id }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
